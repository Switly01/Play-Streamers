<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Play Streamers</title>
<style>
:root{--bg:#09111d;--text:#edf7ff;--muted:#9ab0c7;--line:rgba(178,210,255,.14);--lime:#53fc18;--violet:#9b8cff;--magenta:#ff629c;--cyan:#5de4ff;--amber:#ffbd4a;--red:#ff6970;font-family:Inter,Segoe UI,Arial,sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--text);background:radial-gradient(circle at 8% 0%,rgba(83,252,24,.16),transparent 28%),radial-gradient(circle at 93% 12%,rgba(155,140,255,.17),transparent 30%),linear-gradient(135deg,#07101c,#0c1729 52%,#121026);overflow-x:hidden}button,input,select{font:inherit}button{cursor:pointer}.app{max-width:1900px;margin:auto;padding:20px 28px 30px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:6px 4px 18px}.brand{display:flex;align-items:center;gap:11px}.brand-logo{display:grid;place-items:center;width:37px;height:37px;border:1px solid rgba(83,252,24,.55);border-radius:10px 10px 10px 3px;color:var(--lime);background:#050a08;box-shadow:0 0 20px rgba(83,252,24,.2),inset 0 0 10px rgba(83,252,24,.07);font-size:14px;font-weight:800;letter-spacing:-.08em;transform:skewY(-6deg)}.brand-name{font:700 13px ui-monospace,Consolas,monospace;letter-spacing:.14em;color:#d9ecff}.updates{display:grid;place-items:center;width:19px;height:19px;padding:0;border:1px solid rgba(174,239,255,.45);border-radius:50%;color:#bcefff;background:rgba(93,228,255,.08);font-family:Georgia,serif;font-weight:700}.updates:hover,.login:hover{transform:scale(1.04);box-shadow:0 0 17px rgba(93,228,255,.2)}.actions{display:flex;align-items:center;gap:9px}.login,.icon-btn,.clear{border:1px solid rgba(255,255,255,.16);border-radius:10px;color:var(--muted);background:rgba(10,22,37,.58)}.login{display:grid;padding:6px 10px;text-align:right}.login span{font-size:9px}.login strong{color:#edfff0;font-size:12px}.icon-btn{width:30px;height:30px;color:#bcefff;font-size:19px}.clear{padding:9px 14px;font:11px ui-monospace,Consolas,monospace}.workspace-tabs{display:flex;gap:8px;margin:0 0 15px;padding:5px;border:1px solid var(--line);border-radius:14px;background:rgba(13,27,46,.52);backdrop-filter:blur(12px)}.workspace-tabs button{flex:1;border:1px solid transparent;border-radius:10px;padding:10px 15px;color:var(--muted);background:transparent;font-size:13px;font-weight:700}.workspace-tabs button.active{border-color:rgba(83,252,24,.45);color:#ccffc0;background:rgba(83,252,24,.1)}.view[hidden]{display:none!important}.ticker{display:flex;overflow:hidden;margin-bottom:22px;border:1px solid rgba(83,252,24,.2);border-radius:13px;background:rgba(16,29,47,.5)}.ticker b{display:flex;align-items:center;padding:9px 12px;color:#061208;background:var(--lime);font:800 10px ui-monospace,Consolas,monospace;letter-spacing:.1em}.ticker div{overflow:hidden;padding:9px 17px;color:#d9eaff;font:12px ui-monospace,Consolas,monospace;white-space:nowrap}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px}.card{--c:var(--violet);--rgb:155,140,255;position:relative;display:flex;min-height:420px;overflow:hidden;border:1px solid rgba(var(--rgb),.38);border-radius:19px;background:linear-gradient(145deg,rgba(25,42,66,.79),rgba(12,23,40,.58));box-shadow:0 17px 40px rgba(1,7,17,.23),inset 0 1px 0 rgba(255,255,255,.08);backdrop-filter:blur(18px)}.card:after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 100% 0%,rgba(var(--rgb),.16),transparent 38%)}.card.violet{--c:var(--violet);--rgb:155,140,255}.card.magenta{--c:var(--magenta);--rgb:255,98,156}.card.lime{--c:var(--lime);--rgb:83,252,24}.card.cyan{--c:var(--cyan);--rgb:93,228,255}.card.amber{--c:var(--amber);--rgb:255,189,74}.card.donate{grid-column:1/-1;width:min(58%,860px);justify-self:center}.card-body{position:relative;z-index:1;display:flex;flex:1;flex-direction:column;min-width:0;padding:22px}.card-head{display:grid;grid-template-columns:minmax(0,1fr) auto auto;align-items:center;gap:9px;margin-bottom:17px}.title{display:flex;align-items:center;min-width:0;gap:9px}.title h2{overflow:hidden;margin:0;color:#eaf4ff;font-size:17px;text-overflow:ellipsis;white-space:nowrap}.logo{display:grid;flex:0 0 auto;place-items:center;width:26px;height:26px;border-radius:7px 7px 7px 2px;color:#061208;background:var(--lime);font-size:17px;font-weight:800}.logo.donate{border:2px solid var(--amber);border-radius:50% 50% 50% 3px;color:#fff2d6;background:#7e3c08;font-size:15px}.expand,.event-expand{border:1px solid rgba(var(--rgb),.38);border-radius:8px;color:var(--c);background:rgba(4,12,24,.55);cursor:pointer}.expand{width:29px;height:29px;font-size:17px;opacity:0;transition:.16s}.card:hover .expand,.card:focus-within .expand{opacity:1}.count{color:var(--c);font:800 29px ui-monospace,Consolas,monospace;letter-spacing:-.05em}.entries{display:flex;flex:1;flex-direction:column;gap:9px;max-height:480px;margin:0;padding:0 2px 2px;overflow:auto;list-style:none}.entries li{position:relative;display:flex;align-items:flex-start;gap:9px;min-height:73px;padding:10px 10px 10px 12px;border:1px solid rgba(255,255,255,.09);border-radius:12px;background:rgba(6,16,31,.42);font-size:13px;transition:opacity .3s,transform .45s,max-height .45s,padding .45s}.entries li.new{border-color:var(--c);background:rgba(var(--rgb),.14);box-shadow:0 0 0 1px rgba(var(--rgb),.2),0 0 18px rgba(var(--rgb),.55);animation:glow 1.5s ease-in-out infinite alternate}.entries li.read{opacity:.63;filter:saturate(.72)}.entries li.removing{opacity:0;max-height:0;min-height:0;margin:-4px 0;padding-top:0;padding-bottom:0;transform:translateX(14px);overflow:hidden}@keyframes glow{to{box-shadow:0 0 0 1px rgba(var(--rgb),.5),0 0 26px rgba(var(--rgb),.8)}}.event-main{display:flex;flex:1;flex-direction:column;min-width:0;gap:4px}.event-top{display:flex;align-items:center;min-width:0;gap:7px}.name{overflow:hidden;font-weight:700;text-overflow:ellipsis;white-space:nowrap}.meta{margin-left:auto;flex:0 0 auto;color:#b2c6dc;font:10px ui-monospace,Consolas,monospace}.message{display:-webkit-box;overflow:hidden;color:#c1d1e0;font-size:11px;line-height:1.35;-webkit-box-orient:vertical;-webkit-line-clamp:2}.message a{color:var(--c);font-weight:700}.event-expand{width:25px;height:25px;flex:0 0 auto;font-size:14px}.sub-badge,.source-badge{display:inline-flex;align-items:center;gap:3px;flex:0 0 auto;border-radius:999px;font:700 9px ui-monospace,Consolas,monospace}.sub-badge{padding:2px 5px;border:1px solid rgba(83,252,24,.44);color:#b9ffa3;background:rgba(83,252,24,.1)}.source-badge{display:grid;width:18px;height:18px;place-items:center;border:1px solid rgba(255,189,74,.55);border-radius:6px;color:#fff0d2;background:rgba(126,60,8,.75);font-size:10px}.empty{display:none;padding:15px 2px;color:var(--muted);font-size:13px;line-height:1.5}.empty.show{display:block}.card.expanded{position:fixed;z-index:30;top:50%;left:50%;width:min(1120px,calc(100vw - 38px));height:min(730px,calc(100vh - 64px));min-height:0!important;transform:translate(-50%,-50%);border-color:var(--c);box-shadow:0 28px 90px rgba(0,0,0,.54),0 0 44px rgba(var(--rgb),.35)}.card.expanded .expand{opacity:1;font-size:0}.card.expanded .expand:after{content:"×";font-size:22px}.card.expanded .entries{max-height:none}.stats-desc{margin:0 0 18px;color:var(--muted);font-size:12px}.rank{display:flex;flex-direction:column;gap:9px;margin:0;padding:0;overflow:auto;list-style:none}.rank li{display:grid;grid-template-columns:30px minmax(0,1fr) auto;align-items:center;gap:10px;min-height:48px;padding:9px 11px;border:1px solid rgba(255,255,255,.09);border-radius:11px;background:rgba(6,16,31,.4)}.rank-num{display:grid;width:25px;height:25px;place-items:center;border-radius:8px;color:#07101c;background:var(--lime);font:800 11px ui-monospace,Consolas,monospace}.rank-name{min-width:0;overflow:hidden;font-weight:700;text-overflow:ellipsis;white-space:nowrap}.rank strong{color:#caffb4;font:11px ui-monospace,Consolas,monospace}.period-tabs{display:flex;gap:7px;margin-bottom:12px}.period-tabs button{flex:1;border:1px solid rgba(var(--rgb),.3);border-radius:8px;padding:7px;color:var(--muted);background:rgba(4,13,26,.36);font-size:10px;font-weight:700}.period-tabs button.active{border-color:var(--c);color:var(--c);background:rgba(var(--rgb),.12)}.period-list[hidden]{display:none!important}.foot{text-align:center;margin:25px 0 0;color:rgba(188,211,237,.7);font:11px ui-monospace,Consolas,monospace}.overlay{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:20px;background:rgba(1,6,14,.72);backdrop-filter:blur(8px)}.overlay[hidden]{display:none!important}.dialog{position:relative;width:min(590px,100%);max-height:calc(100vh - 40px);overflow:auto;border:1px solid rgba(83,252,24,.45);border-radius:20px;padding:26px;background:linear-gradient(145deg,rgba(24,43,65,.98),rgba(10,21,38,.98));box-shadow:0 28px 80px rgba(0,0,0,.54)}.dialog h1,.dialog h2{margin:7px 0}.dialog p{color:var(--muted);font-size:13px;line-height:1.55}.close{position:absolute;top:13px;right:13px;width:29px;height:29px;border:1px solid rgba(255,255,255,.16);border-radius:8px;color:#c7d8e8;background:rgba(6,16,31,.5);font-size:20px}.eyebrow{color:#aaff87;font:700 10px ui-monospace,Consolas,monospace;letter-spacing:.11em}.form{display:grid;gap:12px}.field{display:grid;grid-template-columns:28px 1fr;align-items:center;gap:9px;color:#d9eaff;font-size:12px;font-weight:700}.field input,.slot input,.slot select{min-width:0;border:1px solid rgba(255,255,255,.14);border-radius:9px;padding:10px;outline:0;color:var(--text);background:rgba(4,13,26,.47);font:11px ui-monospace,Consolas,monospace}.field input{grid-column:2}.donate-head{display:flex;align-items:center;justify-content:space-between}.small-add{border:1px solid rgba(255,189,74,.4);border-radius:8px;padding:6px 8px;color:#ffe1a8;background:rgba(255,189,74,.09);font-size:10px}.slots{display:grid;gap:8px}.slot{display:grid;grid-template-columns:38px .45fr 1fr 28px;align-items:center;gap:7px}.slot .url{grid-column:2/4}.remove{width:28px;height:28px;border:1px solid rgba(255,105,112,.38);border-radius:8px;color:#ffbec2;background:rgba(255,105,112,.09)}.form-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:6px}.primary,.secondary{border:0;border-radius:9px;padding:10px 13px;font-weight:800}.primary{color:#061208;background:linear-gradient(135deg,var(--lime),#b7ff91)}.secondary{border:1px solid rgba(255,255,255,.16);color:#c9d9e8;background:rgba(7,17,30,.55)}.popover{position:fixed;z-index:42;top:76px;right:100px;width:260px;padding:12px;border:1px solid rgba(93,228,255,.34);border-radius:14px;background:rgba(10,23,40,.95);box-shadow:0 15px 44px rgba(0,0,0,.35)}.popover[hidden]{display:none!important}.con-row{display:flex;align-items:center;gap:9px;padding:7px 1px}.con-icon{display:grid;width:28px;height:28px;place-items:center;border:1px solid rgba(255,189,74,.65);border-radius:8px;color:#fff1d1;background:#7e3c08;font-weight:800}.con-icon.kick{color:#061208;border-color:var(--lime);background:var(--lime)}.con-row p{display:grid;flex:1;gap:2px;margin:0}.con-row strong{font-size:12px}.con-row small{color:var(--muted);font:10px ui-monospace,Consolas,monospace}.con-row .refresh{width:26px;height:26px;border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#bcefff;background:rgba(255,255,255,.06);font-size:15px}.notice-layer{position:fixed;z-index:90;top:18px;right:18px;display:grid;gap:9px;width:min(390px,calc(100vw - 36px))}.notice{display:grid;grid-template-columns:26px 1fr auto;gap:10px;padding:12px;border:1px solid rgba(93,228,255,.35);border-radius:13px;background:rgba(10,23,40,.94);box-shadow:0 14px 36px rgba(0,0,0,.3)}.notice i{display:grid;width:26px;height:26px;place-items:center;border-radius:8px;color:#061208;background:#5de4ff;font-style:normal;font-weight:800}.notice strong{font-size:12px}.notice p{margin:3px 0 0;color:#b8cadc;font-size:11px}.notice button{border:0;color:#a4bad2;background:transparent;font-size:18px}.event-message{min-height:125px;margin:20px 0;padding:15px;border:1px solid rgba(255,255,255,.09);border-radius:12px;color:#d8e9f7;background:rgba(4,13,26,.42);line-height:1.6;overflow-wrap:anywhere}.event-foot{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font:11px ui-monospace,Consolas,monospace}.event-foot a{border:1px solid rgba(83,252,24,.46);border-radius:9px;padding:8px 10px;color:#c6ffb2;background:rgba(83,252,24,.1);text-decoration:none;font-family:inherit;font-weight:700}.updates article{margin-top:10px;padding:14px;border:1px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(4,13,26,.35)}.updates article:first-of-type{border-color:rgba(83,252,24,.36);background:rgba(83,252,24,.06)}.updates article>div{display:flex;justify-content:space-between;gap:8px}.updates time{color:var(--muted);font-size:10px}.updates li{margin:5px 0;color:#b9ccdf;font-size:11px;line-height:1.45}@media(max-width:900px){.app{padding:15px}.grid{grid-template-columns:1fr}.card.donate{width:100%}.card{min-height:350px}.slot{grid-template-columns:34px 1fr 28px}.slot .url{grid-column:1/3}.remove{grid-column:3;grid-row:1/3}.popover{right:14px;top:68px}}@media(max-width:560px){.brand-name{font-size:10px;letter-spacing:.08em}.updates{display:none}.login span{display:none}.card-body{padding:16px}.title h2{font-size:14px}.ticker b{display:none}.event-foot{flex-direction:column}.card.expanded{width:calc(100vw - 24px)}}
</style>
</head>
<body>
<main class="app">
  <header class="topbar"><div class="brand"><span class="brand-logo">PS</span><span class="brand-name">PLAY STREAMERS</span><button class="updates" id="updatesBtn">i</button></div><div class="actions"><button class="login" id="setupBtn"><span>Kanal hesapların</span><strong>Kurulumu düzenle</strong></button><button class="icon-btn" id="connectionBtn">⌁</button><button class="clear" id="clearBtn">Sıfırla</button></div></header>
  <nav class="workspace-tabs"><button class="active" data-view="panel">Yayıncı Paneli</button><button data-view="stats">Yayıncı İstatistikleri</button></nav>
  <section class="view" id="panelView"><div class="ticker"><b>SON OLAYLAR</b><div id="ticker">Henüz olay yok — veri kaynağı bağlandığında burada akacak.</div></div><div class="grid" id="panelGrid"></div></section>
  <section class="view" id="statsView" hidden><div class="grid" id="statsGrid"></div></section>
  <p class="foot">Developed by <strong>Switly</strong></p>
</main>
<aside class="popover" id="connections" hidden><div id="connectionList"></div><button class="secondary" style="width:100%;margin-top:6px" id="editConnections">Bağlantıları düzenle</button></aside>
<div class="notice-layer" id="notices"></div>
<div class="overlay" id="setupOverlay" hidden><section class="dialog"><span class="eyebrow">BİR KEREYE MAHSUS KURULUM</span><h1>Hesaplarını bağla</h1><p>Yalnızca burada kaydettiğin Kick kanalı ve Donate hesapları için veri tutulur. En fazla beş donate hesabı ekleyebilirsin.</p><form class="form" id="setupForm"><label class="field"><span class="logo">K</span>Kick kanal bağlantın<input id="kickUrl" required type="url" placeholder="https://kick.com/kullaniciadi"></label><div><div class="donate-head"><strong>Donate Hesapları</strong><button class="small-add" type="button" id="addAccount">＋ Hesap ekle</button></div><div class="slots" id="slots"></div></div><div class="form-actions"><button class="secondary" type="button" id="setupCancel">Vazgeç</button><button class="primary" type="submit">Bağlantıları kaydet</button></div></form></section></div>
<div class="overlay" id="modal" hidden></div><div class="overlay" id="updatesOverlay" hidden></div>
<script>
(() => {
  const KEY='play-streamers-v17-site'; const MAX=5; let draft=[]; let removalTimers=new Set();
  const empty=()=>({settings:{setupComplete:false,kickChannelUrl:'',donationAccounts:[]},events:{subs:{},kicks:[],gifts:[],donations:[]},totals:{kicks:0,donations:0,gifts:0},stats:{subs:{},joined:{},gifts:{month:{},all:{}},kicks:{month:{},all:{}},donations:{month:{},all:{}}}});
  let state=JSON.parse(localStorage.getItem(KEY)||'null')||empty(); const $=(s,root=document)=>root.querySelector(s); const $$=(s,root=document)=>[...root.querySelectorAll(s)];
  const save=()=>localStorage.setItem(KEY,JSON.stringify(state)); const esc=s=>{const d=document.createElement('div');d.textContent=String(s??'');return d.innerHTML}; const month=()=>new Date().toISOString().slice(0,7); const dt=t=>new Intl.DateTimeFormat('tr-TR',{dateStyle:'short',timeStyle:'short'}).format(new Date(t||Date.now()));
  const money=(n,c='TRY')=>(c==='TRY'?'₺':c+' ')+Number(n||0).toLocaleString('tr-TR',{maximumFractionDigits:2}); const id=()=>Math.random().toString(36).slice(2)+Date.now().toString(36); const hue=s=>[...String(s)].reduce((a,c)=>(a*31+c.charCodeAt(0))%360,0);
  function notice(title,message,kind='i'){const n=document.createElement('article');n.className='notice';n.innerHTML=`<i>${kind}</i><div><strong>${esc(title)}</strong><p>${esc(message)}</p></div><button>×</button>`;n.querySelector('button').onclick=()=>n.remove();$('#notices').append(n);setTimeout(()=>n.remove(),5000)}
  function eventMessage(v){return esc(v||'').replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank">$1</a>')}
  function listCard(key,title,cls,rows,mapper,emptyText,count){return `<section class="card ${cls}" data-card="${key}"><div class="card-body"><div class="card-head"><div class="title"><span class="logo ${key==='donations'?'donate':''}">${key==='donations'?'₺':'K'}</span><h2>${title}</h2></div><button class="expand">⛶</button><div class="count">${count}</div></div><ul class="entries" id="list-${key}">${rows.map(mapper).join('')}</ul><div class="empty ${rows.length?'':'show'}">${emptyText}</div></div></section>`}
  function itemHtml(item,kind){const icon=item.sourceIcon?`<span class="source-badge">${esc(item.sourceIcon)}</span>`:'';const badge=kind==='subs'?'<span class="sub-badge">K Abone</span>':'';const accent=kind==='gifts'?`style="border-color:hsl(${hue(item.name)} 85% 66%)"`:'';return `<li class="${item.read?'read':'new'}" ${accent} data-kind="${kind}" data-id="${esc(item.id)}"><div class="event-main"><div class="event-top">${icon}<span class="name">${esc(item.name)}</span>${badge}<span class="meta">${esc(item.meta)}</span></div><div class="message">${eventMessage(item.message)}</div></div><button class="event-expand">⛶</button></li>`}
  function panel(){const subs=Object.values(state.events.subs);const one=subs.filter(x=>x.months===1).sort((a,b)=>b.at-a.at),multi=subs.filter(x=>x.months>=2).sort((a,b)=>b.at-a.at);const kicks=state.events.kicks,gifts=state.events.gifts,dons=state.events.donations;const mapSub=x=>itemHtml({id:x.id,name:x.name,meta:dt(x.at),message:x.message,read:x.read,at:x.at,sourceUrl:x.sourceUrl},'subs');const mapKick=x=>itemHtml({id:x.id,name:x.name,meta:`${x.amount} kicks · ${dt(x.at)}`,message:x.message,read:x.read,at:x.at,sourceUrl:x.sourceUrl},'kicks');const mapGift=x=>itemHtml({id:x.id,name:x.name,meta:`${x.count} hediye · ${dt(x.at)}`,message:x.message,read:x.read,at:x.at,sourceUrl:x.sourceUrl},'gifts');const mapDon=x=>itemHtml({id:x.id,name:x.name,meta:`${money(x.amount,x.currency)} · ${dt(x.at)}`,message:x.message,read:x.read,at:x.at,sourceUrl:x.sourceUrl,sourceIcon:x.sourceIcon},'donations');$('#panelGrid').innerHTML=[listCard('onemonth','1 Aylık Aboneler','violet',one,mapSub,'Yeni abonelikler burada görünür.',one.length),listCard('multimonth','2+ Aylık Aboneler','magenta',multi,mapSub,'Kümülatif abonelikler burada görünür.',multi.length),listCard('kicks','Kicksler','lime',kicks,mapKick,'Kicks olayları burada görünür.',state.totals.kicks),listCard('gifts','Hediye Abonelikler','cyan',gifts,mapGift,'Hediye abonelikler burada görünür.',state.totals.gifts),listCard('donations','Donate Hesapları','amber donate',dons,mapDon,'Bağış olayları burada görünür.',money(state.totals.donations))].join('');bindPanel();const t=[...dons.slice(0,4).map(x=>`💰 ${x.name} — ${money(x.amount,x.currency)}`),...kicks.slice(0,4).map(x=>`⚡ ${x.name} — ${x.amount} kicks`),...gifts.slice(0,3).map(x=>`🎁 ${x.name} — ${x.count} hediye`)];$('#ticker').textContent=t.length?t.join('     •     '):'Henüz olay yok — veri kaynağı bağlandığında burada akacak.'}
  function bindPanel(){$$('.expand').forEach(b=>b.onclick=()=>{const c=b.closest('.card');const on=!c.classList.contains('expanded');$$('.card.expanded').forEach(x=>x.classList.remove('expanded'));if(on)c.classList.add('expanded')});$$('.entries li').forEach(li=>{const kind=li.dataset.kind,item=findEvent(kind,li.dataset.id);li.onclick=e=>{if(e.target.closest('a')||e.target.closest('.event-expand'))return;markRead(kind,item)};li.querySelector('.event-expand').onclick=e=>{e.stopPropagation();openEvent(item,kind)}})}
  function findEvent(kind,eventId){if(kind==='subs')return Object.values(state.events.subs).find(x=>x.id===eventId);return state.events[kind].find(x=>x.id===eventId)}
  function markRead(kind,item){if(!item||item.read)return;item.read=true;item.readAt=Date.now();save();render();scheduleRemove(kind,item)}
  function scheduleRemove(kind,item){const k=kind+item.id;if(removalTimers.has(k))return;removalTimers.add(k);const wait=Math.max(0,60000-(Date.now()-(item.readAt||Date.now())));setTimeout(()=>{if(kind==='subs')delete state.events.subs[item.name.toLowerCase()];else state.events[kind]=state.events[kind].filter(x=>x.id!==item.id);save();removalTimers.delete(k);render()},wait)}
  function openEvent(item,kind){if(!item)return;const donate=kind==='donations';const url=item.sourceUrl||'#';$('#modal').hidden=false;$('#modal').innerHTML=`<section class="dialog"><button class="close">×</button><span class="eyebrow">OLAY AYRINTISI</span><h2>${esc(item.name)}</h2><div class="event-message">${eventMessage(item.message)}</div><div class="event-foot"><span>${esc(item.meta||dt(item.at))}</span><a href="${esc(url)}" target="_blank">${donate?(item.sourceName||'Donate'):'Kick'} sitesinde aç ↗</a></div></section>`;$('#modal .close').onclick=closeModal;$('#modal').onclick=e=>{if(e.target===$('#modal'))closeModal}}
  function closeModal(){$('#modal').hidden=true;$('#modal').innerHTML=''}
  function askConfirm(title,message){return new Promise(resolve=>{$('#modal').hidden=false;$('#modal').innerHTML=`<section class="dialog"><span class="eyebrow">ONAY GEREKLİ</span><h2>${esc(title)}</h2><p>${esc(message)}</p><div class="form-actions"><button class="secondary" id="confirmNo">Vazgeç</button><button class="primary" id="confirmYes">Onayla</button></div></section>`;$('#confirmNo').onclick=()=>{closeModal();resolve(false)};$('#confirmYes').onclick=()=>{closeModal();resolve(true)}})}
  function leaderboard(obj){return Object.values(obj||{}).sort((a,b)=>b.total-a.total||b.at-a.at).slice(0,10)}
  function rank(rows,fmt){return rows.length?`<ol class="rank">${rows.map((r,i)=>`<li><span class="rank-num">${i+1}</span><span class="rank-name">${esc(r.name)}</span><strong>${esc(fmt(r))}</strong></li>`).join('')}</ol>`:'<div class="empty show">Henüz yeterli veri yok.</div>'}
  function statCard(title,cls,body,donate=false){return `<section class="card ${cls} ${donate?'donate':''}"><div class="card-body"><div class="card-head"><div class="title"><span class="logo ${donate?'donate':''}">${donate?'₺':'K'}</span><h2>${title}</h2></div></div>${body}</div></section>`}
  function periodCard(prefix,stats,fmt){return `<div class="period-tabs"><button class="active" data-period="month">Bu ay</button><button data-period="all">Tüm zamanlar</button></div><div class="period-list" data-period-list="month">${rank(leaderboard(stats.month),fmt)}</div><div class="period-list" data-period-list="all" hidden>${rank(leaderboard(stats.all),fmt)}</div>`}
  function stats(){const joined=Object.values(state.stats.joined[month()]||{}).sort((a,b)=>b.at-a.at).slice(0,10);const sub=leaderboard(state.stats.subs);$('#statsGrid').innerHTML=[statCard('Bu Ay Aramıza Katılanlar','violet',`<p class="stats-desc">Bu ay ilk kez 1 aylık abonelik alan kişiler.</p>${rank(joined,()=> 'Yeni abone')}`),statCard('Top Aboneler','magenta',`<p class="stats-desc">Toplam aylık aboneliği en yüksek ilk 10 kişi.</p>${rank(sub,x=>x.total+' ay')}`),statCard('Hediye Abonelikler','cyan',periodCard('gift',state.stats.gifts,x=>x.total+' hediye')),statCard('Kicks Gönderenler','lime',periodCard('kick',state.stats.kicks,x=>x.total+' kicks')),statCard('Donate Gönderenler','amber',periodCard('donate',state.stats.donations,x=>money(x.total)),true)].join('');$$('.period-tabs button').forEach(b=>b.onclick=()=>{const p=b.dataset.period,box=b.closest('.card');$$('.period-tabs button',box).forEach(x=>x.classList.toggle('active',x===b));$$('.period-list',box).forEach(x=>x.hidden=x.dataset.periodList!==p)})}
  function addStat(type,name,amount,at){const key=name.toLowerCase();const set=(bucket)=>{bucket[key]??={name,total:0,at};bucket[key].total+=amount;bucket[key].at=at};if(type==='subs'){set(state.stats.subs);if(amount===1){const m=month();state.stats.joined[m]??={};state.stats.joined[m][key]={name,at}}}else{const target=state.stats[type];set(target.all);target.month[month()]??={};const b=target.month[month()];b[key]??={name,total:0,at};b[key].total+=amount;b[key].at=at}}
  function render(){panel();stats();connections();if(!state.settings.setupComplete)showSetup()}
  function newAccount(x={}){return{id:x.id||id(),name:x.name||`Donate Hesabı ${draft.length+1}`,icon:x.icon||'₺',url:x.url||''}}
  function renderSlots(){const slots=$('#slots');slots.innerHTML=draft.map(a=>`<div class="slot" data-id="${a.id}"><select><option ${a.icon==='₺'?'selected':''}>₺</option><option ${a.icon==='B'?'selected':''}>B</option><option ${a.icon==='♥'?'selected':''}>♥</option><option ${a.icon==='$'?'selected':''}>$</option><option ${a.icon==='✦'?'selected':''}>✦</option></select><input class="n" value="${esc(a.name)}" placeholder="Hesap adı"><input class="url" type="url" value="${esc(a.url)}" required placeholder="https://bagis-sitesi.com/"><button class="remove" type="button" ${draft.length===1?'disabled':''}>×</button></div>`).join('');$$('.remove',slots).forEach((b,i)=>b.onclick=()=>{draft.splice(i,1);renderSlots()});$('#addAccount').disabled=draft.length>=MAX}
  function showSetup(){draft=(state.settings.donationAccounts.length?state.settings.donationAccounts:[newAccount()]).map(newAccount);$('#kickUrl').value=state.settings.kickChannelUrl||'';renderSlots();$('#setupOverlay').hidden=false}
  function hideSetup(){$('#setupOverlay').hidden=true}
  $('#setupBtn').onclick=showSetup;$('#editConnections').onclick=()=>{$('#connections').hidden=true;showSetup()};$('#setupCancel').onclick=()=>{if(state.settings.setupComplete)hideSetup();else notice('Kurulum gerekli','Veri alabilmek için Kick ve en az bir donate hesabı kaydetmelisin.','!')};$('#addAccount').onclick=()=>{if(draft.length<MAX){draft.push(newAccount());renderSlots()}};
  $('#setupForm').onsubmit=e=>{e.preventDefault();try{const kick=new URL($('#kickUrl').value.trim());if(!(kick.hostname==='kick.com'||kick.hostname.endsWith('.kick.com'))||kick.pathname.split('/').filter(Boolean).length!==1)throw Error('Kick bağlantısını https://kick.com/kullaniciadi biçiminde gir.');const accounts=$$('.slot').map((s,i)=>({id:s.dataset.id,icon:$('select',s).value,name:$('.n',s).value.trim()||`Donate Hesabı ${i+1}`,url:new URL($('.url',s).value.trim()).href}));state=empty();state.settings={setupComplete:true,kickChannelUrl:kick.href,donationAccounts:accounts};save();hideSetup();notice('Bağlantılar kaydedildi','Eski veriler temizlendi; yalnızca seçtiğin hesaplar izlenecek.','✓');render()}catch(err){notice('Bağlantı geçersiz',err.message||'Lütfen geçerli HTTPS bağlantıları gir.','!')}};
  function connections(){const box=$('#connectionList');const acc=state.settings.donationAccounts;box.innerHTML=`<div class="con-row"><span class="con-icon kick">K</span><p><strong>Kick</strong><small>API bağlantısı bekleniyor</small></p><button class="refresh" data-name="Kick">⟳</button></div>${acc.map(a=>`<div class="con-row"><span class="con-icon">${esc(a.icon)}</span><p><strong>${esc(a.name)}</strong><small>Bağlantı bekleniyor</small></p><button class="refresh" data-name="${esc(a.name)}">⟳</button></div>`).join('')||'<small>Henüz hesap eklenmedi.</small>'}`;$$('.refresh',box).forEach(b=>b.onclick=()=>notice('Yenileme bekleniyor',`${b.dataset.name} için canlı API bağlantısı kurulduğunda buradan yenilenecek.`,'i'))}
  $('#connectionBtn').onclick=()=>{$('#connections').hidden=!$('#connections').hidden};$('#clearBtn').onclick=async()=>{if(await askConfirm('Her şeyi sıfırla?','Tüm olaylar, oturum sayaçları ve istatistikler silinecek.')){const settings=state.settings;state=empty();state.settings=settings;save();render();notice('Panel sıfırlandı','Yeni olaylar sıfırdan sayılacak.','✓')}};
  $$('.workspace-tabs button').forEach(b=>b.onclick=()=>{$$('.workspace-tabs button').forEach(x=>x.classList.toggle('active',x===b));$('#panelView').hidden=b.dataset.view!=='panel';$('#statsView').hidden=b.dataset.view!=='stats'});$('#updatesBtn').onclick=()=>{$('#updatesOverlay').hidden=false;$('#updatesOverlay').innerHTML=`<section class="dialog updates"><button class="close">×</button><span class="eyebrow">PLAY STREAMERS</span><h2>Güncelleme Notları</h2><article><div><strong>1.7 · Güncel</strong><time>12 Temmuz 2026</time></div><ul><li>PS marka kimliği ve güncelleme merkezi eklendi.</li><li>Kick yalnızca kurulumda kaydedilen kanalı izler.</li><li>En fazla 5 simgeli Donate Hesabı eklendi.</li><li>Olay tarih/saatleri, dönem sekmeleri ve sabit büyütme düzeltildi.</li></ul></article><article><div><strong>1.6</strong><time>Önceki sürüm</time></div><ul><li>Olay ayrıntıları, okunmuş olay animasyonları ve istatistik ekranı eklendi.</li></ul></article><article><div><strong>1.5</strong><time>Önceki sürüm</time></div><ul><li>Renkli cam panel tasarımı eklendi.</li></ul></article></section>`;$('.close',$('#updatesOverlay')).onclick=()=>{$('#updatesOverlay').hidden=true}};
  document.addEventListener('click',e=>{if(!$('#connections').hidden&&!e.target.closest('#connections')&&!e.target.closest('#connectionBtn'))$('#connections').hidden=true;if(e.target===$('#modal'))closeModal();if(e.target===$('#updatesOverlay'))$('#updatesOverlay').hidden=true});document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();$('#updatesOverlay').hidden=true;$$('.card.expanded').forEach(x=>x.classList.remove('expanded'))}});
  window.PlayStreamers={addEvent(event){const at=Date.now(),type=event.type;if(type==='subscription'){const key=event.name.toLowerCase(),old=state.events.subs[key],row={id:event.id||id(),name:event.name,months:(old?.months||0)+(event.months||1),message:event.message||`${event.name} abone oldu.`,at,sourceUrl:event.sourceUrl||state.settings.kickChannelUrl,read:false};state.events.subs[key]=row;addStat('subs',event.name,event.months||1,at)}if(type==='kicks'){const row={id:event.id||id(),name:event.name,amount:+event.amount||0,message:event.message||'',at,sourceUrl:event.sourceUrl||state.settings.kickChannelUrl,read:false};state.events.kicks.unshift(row);state.totals.kicks+=row.amount;addStat('kicks',row.name,row.amount,at)}if(type==='gift'){const row={id:event.id||id(),name:event.name,count:+event.count||1,message:event.message||'',at,sourceUrl:event.sourceUrl||state.settings.kickChannelUrl,read:false};state.events.gifts.unshift(row);state.totals.gifts+=row.count;addStat('gifts',row.name,row.count,at)}if(type==='donation'){const row={id:event.id||id(),name:event.name,amount:+event.amount||0,currency:event.currency||'TRY',message:event.message||'',sourceIcon:event.sourceIcon||'₺',sourceName:event.sourceName||'Donate',sourceUrl:event.sourceUrl||'',at,read:false};state.events.donations.unshift(row);state.totals.donations+=row.amount;addStat('donations',row.name,row.amount,at)}save();render()},startBroadcast(){state.events={subs:{},kicks:[],gifts:[],donations:[]};state.totals={kicks:0,donations:0,gifts:0};save();render()}};
  render();
})();
</script>
