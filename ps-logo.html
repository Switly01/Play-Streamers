<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Play Streamers PS Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;background:transparent}
    body{display:grid;place-items:center;overflow:hidden}
    .ps30-brand-mark{position:relative;display:grid;place-items:center;width:42px;height:42px;overflow:hidden;border:1px solid rgba(83,252,24,.68);border-radius:11px 11px 11px 3px;color:transparent;background:#050a08;box-shadow:none;font-size:0;text-shadow:none;transform:skewY(-6deg)}
    .ps30-brand-mark::after{position:absolute;inset:0;display:grid;place-items:center;content:"PS";color:#53fc18;font:900 25px/1 Inter,"Segoe UI",Arial,sans-serif;letter-spacing:-.14em;transform:skewY(6deg) translate(-1px,-1px)}
  </style>
</head>
<body>
  <span class="ps30-brand-mark">PS</span>
</body>
</html>
